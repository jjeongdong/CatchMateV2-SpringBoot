server:
  shutdown: graceful

spring:
  profiles:
    active: local
  lifecycle:
    timeout-per-shutdown-phase: 30s

notification:
  outbox:
    max-retry-count: 5
    scheduler-delay-ms: 60000
    batch-size: 50

async:
  executor:
    core-pool-size: 10
    max-pool-size: 50
    queue-capacity: 100

chat:
  message:
    flush-delay-ms: 1000
  read-sequence:
    flush-delay-ms: 5000

enroll:
  idempotency:
    ttl-seconds: 10

cors:
  allowed-origins: http://localhost:3000,http://localhost:5173,http://localhost:8080
