server:
  shutdown: graceful

cache:
  enabled: false

spring:
  profiles:
    active: dev
  lifecycle:
    timeout-per-shutdown-phase: 30s

notification:
  outbox:
    max-retry-count: 5
    scheduler-delay-ms: 60000

async:
  executor:
    core-pool-size: 10
    max-pool-size: 50
    queue-capacity: 100

enroll:
  idempotency:
    ttl-seconds: 10
