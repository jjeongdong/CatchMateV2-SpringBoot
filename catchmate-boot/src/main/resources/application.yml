server:
  shutdown: graceful

spring:
  profiles:
    active: local
  cache:
    type: none
  lifecycle:
    timeout-per-shutdown-phase: 30s

notification:
  outbox:
    max-retry-count: 5
    scheduler-delay-ms: 60000

async:
  executor:
    core-pool-size: 10
    max-pool-size: 50
    queue-capacity: 100

chat:
  read-sequence:
    flush-delay-ms: 5000

enroll:
  idempotency:
    ttl-seconds: 10
