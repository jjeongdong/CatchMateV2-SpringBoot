server:
  shutdown: graceful
  tomcat:
    mbeanregistry:
      enabled: true

spring:
  profiles:
    active: local
  datasource:
    url: jdbc:mysql://localhost:3306/catchmate?rewriteBatchedStatements=true
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 30000
  lifecycle:
    timeout-per-shutdown-phase: 30s

notification:
  outbox:
    max-retry-count: 5
    scheduler-delay-ms: 60000

async:
  executor:
    core-pool-size: 10
    max-pool-size: 50
    queue-capacity: 100

chat:
  read-sequence:
    flush-delay-ms: 5000
    # V1_DIRTY_CHECK | V2_DIRECT_UPDATE | V3_JAVA_BUFFERED | V4_LUA_BUFFERED
    mode: V4_LUA_BUFFERED

enroll:
  idempotency:
    ttl-seconds: 10

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: catchmate
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99

