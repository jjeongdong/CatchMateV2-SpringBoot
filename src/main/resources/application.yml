server:
  shutdown: graceful
  tomcat:
    # WebSocket 연결은 커넥션을 상시 점유한다. 기본 max-connections=8192 를 상향해 수천~수만 동시 연결 대비.
    max-connections: 50000
    accept-count: 500

# STOMP 채널 스레드풀 (WebSocketConfig).
#  - inbound: 큐 무제한(수신 유실 방지) → pool-size 가 실효 병렬도(core=max).
#  - outbound: 유한 큐로 maxPoolSize 를 실제 발동시키고, 포화 시 드롭+카운트(websocket.outbound.dropped).
#    부하 테스트에서 이 카운터가 0→1 이 되는 지점이 "라이브 전달 천장". queue-capacity 는 버스트 허용 버퍼.
websocket:
  inbound:
    pool-size: 16
  outbound:
    core-pool-size: 8
    max-pool-size: 32
    queue-capacity: 10000

spring:
  profiles:
    active: dev
  lifecycle:
    timeout-per-shutdown-phase: 30s

notification:
  outbox:
    max-retry-count: 5
    scheduler-delay-ms: 60000
    batch-size: 50
  # 알림 즉시발송 전용 executor. 과부하 시 즉시발송을 버리고(CallerRuns 금지) 스케줄러가 회수 → 웹 스레드 커넥션 데드락 방지.
  dispatch:
    executor:
      core-pool-size: 50
      max-pool-size: 50
      queue-capacity: 1000

# 모니터링 / 메트릭 (프로파일 공통). 노출 엔드포인트는 각 프로파일 yml 의 management.endpoints 에서 제어.
management:
  metrics:
    tags:
      application: catchmate
    distribution:
      # http.server.requests 와 outbox 지연(PENDING→SUCCESS)에 대해 히스토그램/백분위 버킷을 생성 → Prometheus 에서 p95/p99 집계 가능
      percentiles-histogram:
        http.server.requests: true
        notification.outbox.latency: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
        notification.outbox.latency: 0.5, 0.95, 0.99
      slo:
        http.server.requests: 50ms, 100ms, 200ms, 500ms, 1s
        # 알림은 즉시 발송(밀리초)부터 스케줄러 재시도(60s 주기) 까지 폭이 넓어 더 큰 버킷을 둔다
        notification.outbox.latency: 100ms, 500ms, 1s, 5s, 30s, 1m, 5m
  observations:
    key-values:
      application: catchmate

async:
  executor:
    core-pool-size: 50
    max-pool-size: 50
    queue-capacity: 5000

chat:
  room-sequence:
    flush-delay-ms: 1000
  read-sequence:
    flush-delay-ms: 5000

enroll:
  idempotency:
    ttl-seconds: 10

# 문의 답변 RAG 어시스트
assist:
  search:
    top-k: 3
    similarity-threshold: 0.4
